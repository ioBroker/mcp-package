version: 2
updates:
    # Maintain dependencies for GitHub Actions
    - package-ecosystem: github-actions
      directory: '/'
      schedule:
          interval: monthly
          time: '04:00'
          timezone: Europe/Berlin
    - package-ecosystem: npm
      directory: '/'
      schedule:
          interval: monthly
          time: '04:00'
          timezone: Europe/Berlin
      open-pull-requests-limit: 15
      versioning-strategy: increase
      # Hold new releases for a week before opening a PR — reduces supply-chain risk
      # from compromised packages that get yanked shortly after publication.
      cooldown:
          default-days: 7
      ignore:
          # Pin @types/node to the installed Node.js major; major bumps require a
          # matching js-controller / engines change and shouldn't be automated.
          - dependency-name: '@types/node'
            update-types: ['version-update:semver-major']
